<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portfolio</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f0f4f8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:500px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
            text-align:center;
        }

        h1{
            color:#0078D4;
            margin-bottom:20px;
        }

        h2{
            color:#333;
            margin-top:15px;
            font-size:20px;
        }

        p{
            color:#555;
            margin-top:5px;
            font-size:17px;
        }

        .achievement{
            margin-top:20px;
            background:#0078D4;
            color:white;
            padding:12px;
            border-radius:8px;
            font-weight:bold;
        }

        .footer{
            margin-top:25px;
            color:#777;
            font-size:14px;
        }
    </style>

</head>

<body>

<div class="card">

    <h1>Student Portfolio</h1>

    <h2>Name</h2>
    <p>Muhammad Zaid</p>

    <h2>Registration Number</h2>
    <p>22-CS-123</p>

    <h2>Current Semester</h2>
    <p>6th Semester</p>

    <h2>Academic Achievement</h2>
    <div class="achievement">
        Completed SAP ABAP Training Successfully
    </div>

    <div class="footer">
        Namal University | Cloud Computing CCP
    </div>

</div>

</body>
</html>
